apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo-helm
  namespace: argocd
spec:
  project: default
  sources:
    - chart: forgejo
      repoURL: code.forgejo.org/forgejo-helm
      targetRevision: 17.1.2
      helm:
#        valueFiles:
#          - '$values/gitops/external-secrets-operator/files/eso-values.yaml'
    - repoURL: https://github.com/riemervdzee/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - FailOnSharedResource=true
